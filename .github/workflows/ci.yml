name: Code Verification (CI)

on:
  push:
    branches: [ main, feat ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout repository codebase
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Setup Node.js environment
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'

    # 3. Install project dependencies
    - name: Install Dependencies
      run: npm ci

    # 4. Verify code format and patterns via ESLint
    - name: Run Linter
      run: npm run lint

    # 5. Build for production to verify compiler correctness
    - name: Test Build compilation
      run: npm run build
